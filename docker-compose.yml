version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: postgres_lab
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shop_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data:/data
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  pgdata: